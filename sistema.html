<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedEasy — Sistema Clínico de Escuta, Transcrição & Índice de Saúde</title>
<meta name="description" content="MedEasy: escuta e transcrição de consultas, resumo e relatório, receitas, encaminhamentos, pedidos e interpretação de exames, dashboard com Índice de Saúde (A–F, 0–100) incluindo saúde mental e hábitos, lembretes e recomendações." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --bg-2: #080b11;
    --card: rgba(18, 24, 33, 0.55);
    --card-solid: #0d1219;
    --gold: #c9a227;
    --gold-light: #e2c464;
    --jade: #2fae7d;
    --jade-light: #45cf99;
    --red: #e05a5a;
    --red-light: #f18b8b;
    --text: #eae8e1;
    --text-muted: #99a2ad;
    --border: rgba(234, 232, 225, 0.09);
    --border-strong: rgba(234, 232, 225, 0.16);
    --serif: 'Fraunces', serif;
    --sans: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    line-height: 1.55; min-height: 100vh; overflow-x: hidden;
  }
  /* background orbs */
  .bg-orbs { position: fixed; inset: 0; z-index: -3; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; will-change: transform; }
  .orb-gold { width: 560px; height: 560px; top: -14%; left: -10%;
    background: radial-gradient(circle, rgba(201,162,39,0.35), transparent 70%); animation: drift1 26s ease-in-out infinite; }
  .orb-jade { width: 520px; height: 520px; bottom: -16%; right: -12%;
    background: radial-gradient(circle, rgba(47,174,125,0.30), transparent 70%); animation: drift2 32s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(70px,50px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-40px)} }
  @media (prefers-reduced-motion: reduce){ .orb{ animation:none!important; } }

  /* futuristic scan sweep */
  .bg-scan { position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: 0.5;
    background: linear-gradient(180deg, transparent 0%, rgba(201,162,39,0.04) 50%, transparent 100%);
    background-size: 100% 260px; animation: scan 9s linear infinite; }
  @keyframes scan { 0%{background-position:0 -260px} 100%{background-position:0 100vh} }
  @media (prefers-reduced-motion: reduce){ .bg-scan{ display:none; } }

  /* splash / boot */
  #splash { position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background: radial-gradient(ellipse at center, #0a0e14 0%, #05070a 70%); transition: opacity 0.6s ease, visibility 0.6s; }
  #splash.hide { opacity: 0; visibility: hidden; }
  #splash .s-logo { width: 78px; height: 78px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 2rem; color: var(--gold-light);
    background: linear-gradient(145deg, rgba(201,162,39,0.18), rgba(201,162,39,0.02)); border: 1px solid rgba(201,162,39,0.5);
    box-shadow: 0 0 40px rgba(201,162,39,0.35), inset 0 0 20px rgba(201,162,39,0.12); animation: pop 1s cubic-bezier(0.16,1,0.3,1); }
  #splash .s-name { font-family: var(--serif); font-size: 1.5rem; letter-spacing: 0.02em; }
  #splash .s-bar { width: 160px; height: 3px; border-radius: 3px; background: rgba(234,232,225,0.1); overflow: hidden; }
  #splash .s-bar i { display: block; height: 100%; width: 40%; border-radius: 3px; background: linear-gradient(90deg, var(--gold-light), var(--jade-light)); animation: load 1.1s ease-in-out infinite; }
  @keyframes pop { from{ transform: scale(0.6); opacity: 0; } to{ transform: scale(1); opacity: 1; } }
  @keyframes load { 0%{ transform: translateX(-120%);} 100%{ transform: translateX(320%);} }

  /* ---------- AUTH GATE ---------- */
  #authGate { position: fixed; inset: 0; z-index: 450; display: none; align-items: center; justify-content: center; padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, #0b0f16 0%, #05070a 70%); overflow-y: auto; }
  #authGate.show { display: flex; }
  .auth-card { width: 100%; max-width: 400px; background: var(--card-solid); border: 1px solid var(--border-strong); border-radius: 20px; padding: 30px 26px; box-shadow: 0 40px 100px rgba(0,0,0,0.6); }
  .auth-logo { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 1.6rem; color: var(--gold-light); background: linear-gradient(145deg, rgba(201,162,39,0.18), rgba(201,162,39,0.02)); border: 1px solid rgba(201,162,39,0.5); box-shadow: 0 0 30px rgba(201,162,39,0.3); }
  .auth-card h2 { font-size: 1.4rem; text-align: center; margin-bottom: 4px; }
  .auth-card .sub { text-align: center; color: var(--text-muted); font-size: 0.86rem; margin-bottom: 20px; }
  .auth-err { color: var(--red-light); font-size: 0.8rem; text-align: center; margin-top: 10px; min-height: 16px; }
  .auth-foot { text-align: center; font-size: 0.76rem; color: var(--text-muted); margin-top: 16px; }
  .auth-foot a { color: var(--gold-light); cursor: pointer; }
  .plan-badge { font-family: var(--mono); font-size: 0.58rem; padding: 2px 8px; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; }
  .plan-free { background: rgba(234,232,225,0.08); color: var(--text-muted); border: 1px solid var(--border); }
  .plan-pro { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #14100a; }
  .bg-grid {
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background-image:
      linear-gradient(rgba(234,232,225,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(234,232,225,0.03) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 0%, transparent 85%);
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 0%, transparent 85%);
  }
  a { color: inherit; text-decoration: none; }
  h1,h2,h3,h4 { font-family: var(--serif); font-weight: 500; line-height: 1.15; }
  .mono { font-family: var(--mono); }
  .muted { color: var(--text-muted); }
  .grad-text {
    background: linear-gradient(115deg, #fff 0%, #f3ead0 40%, var(--gold-light) 70%, var(--gold) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* ---------- TOP NAV ---------- */
  header.nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(18px) saturate(1.2);
    background: rgba(5,7,10,0.72); border-bottom: 1px solid var(--border);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 22px; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .monogram {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 0.9rem; color: var(--gold-light);
    background: linear-gradient(145deg, rgba(201,162,39,0.15), rgba(201,162,39,0.02));
    border: 1px solid rgba(201,162,39,0.4);
    box-shadow: 0 0 18px rgba(201,162,39,0.18), inset 0 0 12px rgba(201,162,39,0.08);
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.25; }
  .brand-name { font-family: var(--serif); font-size: 0.96rem; }
  .brand-sub { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.05em; color: var(--text-muted); text-transform: uppercase; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .doctor-chip {
    display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono);
    font-size: 0.68rem; color: var(--gold-light); border: 1px solid var(--border);
    padding: 7px 12px; border-radius: 999px; cursor: pointer; background: rgba(255,255,255,0.02);
  }
  .doctor-chip:hover { border-color: var(--gold); }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 9px 16px; border-radius: 999px; font-weight: 600; font-size: 0.84rem;
    cursor: pointer; border: 1px solid transparent; white-space: nowrap; font-family: var(--sans);
    transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.2s ease, border-color 0.2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #14100a; box-shadow: 0 4px 18px rgba(201,162,39,0.25); }
  .btn-gold:hover { filter: brightness(1.06); box-shadow: 0 7px 26px rgba(201,162,39,0.42); }
  .btn-jade { background: linear-gradient(135deg, var(--jade-light), var(--jade)); color: #06110c; box-shadow: 0 4px 18px rgba(47,174,125,0.22); }
  .btn-jade:hover { filter: brightness(1.06); }
  .btn-ghost { border-color: var(--border-strong); color: var(--text); background: rgba(255,255,255,0.02); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold-light); }
  .btn-danger { border-color: rgba(224,90,90,0.4); color: var(--red-light); background: rgba(224,90,90,0.06); }
  .btn-danger:hover { border-color: var(--red); }
  .btn-sm { padding: 6px 11px; font-size: 0.76rem; }
  .btn-block { width: 100%; }
  .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; }
  .icon-btn:hover { border-color: var(--gold); color: var(--gold-light); }

  /* ---------- LAYOUT ---------- */
  .app { display: grid; grid-template-columns: 230px 1fr; min-height: calc(100vh - 65px); }
  .sidebar { border-right: 1px solid var(--border); padding: 18px 12px; position: sticky; top: 65px; height: calc(100vh - 65px); overflow-y: auto; }
  .side-group-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 16px 10px 8px; }
  .side-link {
    display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 10px;
    cursor: pointer; color: var(--text-muted); font-size: 0.88rem; font-weight: 500;
    transition: background 0.15s, color 0.15s; margin-bottom: 2px; position: relative;
  }
  .side-link .ico { width: 18px; text-align: center; font-size: 0.95rem; }
  .side-link:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .side-link.active { background: linear-gradient(135deg, rgba(201,162,39,0.16), rgba(201,162,39,0.04)); color: var(--gold-light); }
  .side-link.active::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:3px; border-radius:3px; background: var(--gold); }
  .side-badge { margin-left: auto; background: var(--red); color: #fff; font-family: var(--mono); font-size: 0.6rem; padding: 1px 6px; border-radius: 999px; font-weight: 600; }

  .main { padding: 26px 30px 60px; max-width: 1100px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .page-head h2 { font-size: 1.7rem; }
  .page-head .sub { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
  .head-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ---------- CARDS ---------- */
  .card {
    background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 18px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  }
  .card:hover { border-color: rgba(201,162,39,0.22); box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(201,162,39,0.05); }
  .stat { transition: border-color 0.25s, transform 0.25s; }
  .stat:hover { border-color: rgba(201,162,39,0.25); transform: translateY(-2px); }
  .card h3 { font-size: 1.05rem; margin-bottom: 4px; }
  .card-sub { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  /* stat tiles */
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
  .stat .n { font-family: var(--serif); font-size: 1.9rem; color: var(--gold-light); }
  .stat .l { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .stat.jade .n { color: var(--jade-light); }

  /* ---------- FORM ---------- */
  label.f { display: block; font-size: 0.76rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.02em; }
  input, select, textarea {
    width: 100%; background: rgba(5,7,10,0.6); border: 1px solid var(--border-strong); color: var(--text);
    padding: 10px 12px; border-radius: 10px; font-family: var(--sans); font-size: 0.88rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,162,39,0.12); }
  textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
  select option { background: #0d1219; }
  .field { margin-bottom: 14px; }
  .row { display: grid; gap: 14px; }
  .row.c2 { grid-template-columns: 1fr 1fr; }
  .row.c3 { grid-template-columns: 1fr 1fr 1fr; }

  /* ---------- TABLE / LIST ---------- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .list-item {
    display: flex; align-items: center; gap: 14px; padding: 13px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border); transition: border-color 0.2s;
  }
  .list-item:hover { border-color: var(--border-strong); }
  .list-item .avatar {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 0.9rem; color: var(--gold-light);
    background: linear-gradient(145deg, rgba(201,162,39,0.16), rgba(201,162,39,0.02)); border: 1px solid rgba(201,162,39,0.3);
  }
  .list-item .grow { flex: 1; min-width: 0; }
  .li-title { font-weight: 600; font-size: 0.92rem; }
  .li-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .li-actions { display: flex; gap: 6px; }

  .tag { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 0.66rem; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border-strong); color: var(--text-muted); }
  .tag.gold { color: var(--gold-light); border-color: rgba(201,162,39,0.35); background: rgba(201,162,39,0.06); }
  .tag.jade { color: var(--jade-light); border-color: rgba(47,174,125,0.35); background: rgba(47,174,125,0.06); }
  .tag.red { color: var(--red-light); border-color: rgba(224,90,90,0.35); background: rgba(224,90,90,0.06); }

  .empty { text-align: center; padding: 46px 20px; color: var(--text-muted); }
  .empty .big { font-size: 2.4rem; margin-bottom: 10px; opacity: 0.6; }

  /* ---------- TRANSCRIPTION ---------- */
  .rec-panel { display: grid; grid-template-columns: 1.35fr 1fr; gap: 18px; }
  .transcript-box {
    min-height: 300px; max-height: 460px; overflow-y: auto; padding: 18px; border-radius: 14px;
    background: rgba(5,7,10,0.55); border: 1px solid var(--border-strong); font-size: 0.95rem; line-height: 1.7;
    white-space: pre-wrap;
  }
  .transcript-box .interim { color: var(--text-muted); font-style: italic; }
  .rec-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .rec-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--text-muted); }
  .rec-dot.live { background: var(--red); box-shadow: 0 0 0 0 rgba(224,90,90,0.6); animation: pulseRec 1.4s infinite; }
  @keyframes pulseRec { 0%{box-shadow:0 0 0 0 rgba(224,90,90,0.55)} 70%{box-shadow:0 0 0 10px rgba(224,90,90,0)} 100%{box-shadow:0 0 0 0 rgba(224,90,90,0)} }
  .rec-timer { font-family: var(--mono); font-size: 1.05rem; color: var(--gold-light); }

  /* ---------- MODAL ---------- */
  .modal-back { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-back.open { display: flex; }
  .modal { background: var(--card-solid); border: 1px solid var(--border-strong); border-radius: 18px; width: 100%; max-width: 620px; padding: 24px; box-shadow: 0 40px 90px rgba(0,0,0,0.6); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-head h3 { font-size: 1.2rem; }
  .modal-lg { max-width: 820px; }

  /* toast */
  .toast-wrap { position: fixed; bottom: 22px; right: 22px; z-index: 400; display: flex; flex-direction: column; gap: 10px; }
  .toast { background: var(--card-solid); border: 1px solid var(--border-strong); border-left: 3px solid var(--jade); padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; box-shadow: 0 12px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; max-width: 320px; }
  .toast.gold { border-left-color: var(--gold); }
  .toast.red { border-left-color: var(--red); }
  @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: none; opacity: 1; } }

  .disclaimer { font-size: 0.74rem; color: var(--text-muted); border: 1px dashed var(--border-strong); border-radius: 10px; padding: 10px 13px; margin-top: 8px; line-height: 1.5; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .flag-high { color: var(--red-light); font-weight: 600; }
  .flag-ok { color: var(--jade-light); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip-add { cursor: pointer; }
  .pill-select { display: inline-flex; gap: 6px; background: rgba(5,7,10,0.5); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .pill-select button { background: transparent; border: none; color: var(--text-muted); padding: 6px 14px; border-radius: 999px; cursor: pointer; font-family: var(--sans); font-size: 0.8rem; font-weight: 600; }
  .pill-select button.active { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #14100a; }

  .mobile-tabs { display: none; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mobile-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 65px; background: rgba(5,7,10,0.85); backdrop-filter: blur(10px); z-index: 90; }
    .mobile-tabs .side-link { white-space: nowrap; padding: 8px 12px; }
    .mobile-tabs .side-link.active::before { display: none; }
    .main { padding: 20px 16px 60px; }
    .rec-panel { grid-template-columns: 1fr; }
    .grid-2, .grid-3, .grid-4, .row.c2, .row.c3 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
  }

  /* ---------- PRINT ---------- */
  #printArea { display: none; }
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { display: block !important; position: absolute; inset: 0; color: #111; background: #fff; padding: 0; }
    .bg-orbs, .bg-grid { display: none; }
  }
  .doc {
    color: #14110b; font-family: 'Inter', sans-serif; max-width: 720px; margin: 0 auto; padding: 42px 46px; font-size: 14px; line-height: 1.6;
  }
  .doc-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #c9a227; padding-bottom: 14px; margin-bottom: 26px; }
  .doc-header .dh-name { font-family: 'Fraunces', serif; font-size: 20px; color: #14110b; }
  .doc-header .dh-meta { font-size: 12px; color: #555; margin-top: 3px; }
  .doc-header .dh-right { text-align: right; font-size: 12px; color: #555; }
  .doc h1.doc-title { font-family: 'Fraunces', serif; font-size: 22px; text-align: center; margin: 10px 0 24px; letter-spacing: 0.04em; text-transform: uppercase; color: #14110b; }
  .doc .doc-patient { background: #f6f2e6; border-radius: 8px; padding: 12px 16px; margin-bottom: 22px; font-size: 13px; }
  .doc .doc-body { min-height: 180px; white-space: pre-wrap; }
  .doc .rx-item { padding: 10px 0; border-bottom: 1px dashed #d8cba0; }
  .doc .rx-item .rx-name { font-weight: 700; }
  .doc .rx-item .rx-pos { font-size: 13px; color: #444; }
  .doc .doc-sign { margin-top: 54px; text-align: center; position: relative; }

/* ============================ ÍNDICE DE SAÚDE ============================ */
/* Avaliação multidimensional: Clínico + Saúde Mental + Hábitos → 0-100 e nota A-F */
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function imcCalc(peso,altura){ peso=parseFloat(peso); altura=parseFloat(altura); if(!peso||!altura) return null; if(altura>3) altura=altura/100; return +(peso/(altura*altura)).toFixed(1); }

function computeScore(a){
  // a = avaliacao object with fields. Each sub 0-100.
  // ---- HÁBITOS (0-100) ----
  const atividade = clamp((+a.atividade||0)/5*100,0,100);        // dias de exercício/semana (5+ = 100)
  const sono = (()=>{ const h=+a.sonoHoras||0; if(h>=7&&h<=9) return 100; if(h>=6&&h<10) return 75; if(h>=5) return 50; return 25; })();
  const alimentacao = clamp((+a.alimentacao||0)*10,0,100);       // 0-10
  const hidratacao = clamp((+a.hidratacao||0)*10,0,100);         // 0-10
  const tabagismo = a.tabagismo==='Não'?100 : a.tabagismo==='Ex-fumante'?70 : a.tabagismo==='Sim'?20 : 60;
  const alcool = a.alcool==='Nunca'?100 : a.alcool==='Social'?80 : a.alcool==='Frequente'?35 : 70;
  const habitos = Math.round((atividade*0.25 + sono*0.2 + alimentacao*0.2 + hidratacao*0.1 + tabagismo*0.15 + alcool*0.1));
  // ---- SAÚDE MENTAL (0-100) ----
  const humor = clamp((+a.humor||0)*10,0,100);                   // 0-10 (melhor = maior)
  const ansiedade = clamp(100-(+a.ansiedade||0)*10,0,100);       // 0-10 (maior = pior) invert
  const estresse = clamp(100-(+a.estresse||0)*10,0,100);         // 0-10 invert
  const energia = clamp((+a.energia||0)*10,0,100);               // 0-10
  const sonoMental = clamp((+a.sonoQualidade||0)*10,0,100);      // 0-10
  const mental = Math.round((humor*0.3 + ansiedade*0.2 + estresse*0.2 + energia*0.15 + sonoMental*0.15));
  // ---- CLÍNICO (0-100) ----
  const imc = imcCalc(a.peso,a.altura);
  const imcScore = imc==null?70 : (imc>=18.5&&imc<25)?100 : (imc>=25&&imc<30)||(imc>=17&&imc<18.5)?70 : (imc>=30&&imc<35)?45 : 25;
  const pa = a.pressao==='Normal'?100 : a.pressao==='Limítrofe'?65 : a.pressao==='Alterada'?30 : 75;
  // penalização por exames alterados recentes
  const exFlags = examFlagsForPatient(a.pacienteId);
  const exScore = clamp(100 - exFlags*12, 30, 100);
  const nCond = (a.comorbidades? a.comorbidades.split(',').filter(x=>x.trim()).length : 0);
  const condScore = clamp(100 - nCond*15, 30, 100);
  const clinico = Math.round((imcScore*0.3 + pa*0.25 + exScore*0.25 + condScore*0.2));
  // ---- GERAL ----
  const geral = Math.round(clinico*0.4 + habitos*0.3 + mental*0.3);
  return { geral, clinico, habitos, mental, imc,
    subs:{atividade,sono,alimentacao,hidratacao,tabagismo,alcool,humor,ansiedade,estresse,energia,sonoMental,imcScore,pa,exScore} };
}
function gradeOf(score){
  if(score>=90) return {g:'A',cls:'jade',label:'Excelente'};
  if(score>=80) return {g:'B',cls:'jade',label:'Muito bom'};
  if(score>=70) return {g:'C',cls:'gold',label:'Bom'};
  if(score>=60) return {g:'D',cls:'gold',label:'Atenção'};
  if(score>=50) return {g:'E',cls:'red',label:'Risco'};
  return {g:'F',cls:'red',label:'Risco elevado'};
}
function riskAlerts(a, sc){
  const r=[];
  if((+a.atividade||0)<2) r.push('Sedentarismo — menos de 2 dias de atividade física/semana');
  if((+a.sonoHoras||0)>0 && (+a.sonoHoras)<6) r.push('Privação de sono (< 6h/noite)');
  if(a.tabagismo==='Sim') r.push('Tabagismo ativo');
  if(a.alcool==='Frequente') r.push('Consumo frequente de álcool');
  if((+a.alimentacao||10)<5) r.push('Alimentação de baixa qualidade');
  if((+a.hidratacao||10)<4) r.push('Baixa hidratação');
  if((+a.humor||10)<4) r.push('Humor deprimido — avaliar rastreio de depressão');
  if((+a.ansiedade||0)>6) r.push('Ansiedade elevada');
  if((+a.estresse||0)>7) r.push('Estresse elevado');
  if(sc.imc!=null && sc.imc>=30) r.push('Obesidade (IMC ≥ 30)');
  if(sc.imc!=null && sc.imc<18.5) r.push('Baixo peso (IMC < 18.5)');
  if(a.pressao==='Alterada') r.push('Pressão arterial alterada');
  const ef=examFlagsForPatient(a.pacienteId); if(ef>0) r.push(ef+' exame(s) laboratorial(is) fora da referência');
  return r;
}
function examFlagsForPatient(pid){
  let n=0;
  DB.exames.filter(e=>e.pacienteId===pid).forEach(e=>(e.itens||[]).forEach(it=>{ if(it.flag==='high'||it.flag==='low') n++; }));
  return n;
}
function latestAvaliacao(pid){
  return DB.avaliacoes.filter(a=>a.pacienteId===pid).sort((a,b)=>(b.data||'').localeCompare(a.data||''))[0];
}
function patientScore(pid){
  const a=latestAvaliacao(pid); if(!a) return null; const sc=computeScore(a); return {a,sc,grade:gradeOf(sc.geral),risks:riskAlerts(a,sc)};
}

function scoreRing(score, size){
  size=size||110; const g=gradeOf(score); const r=(size-14)/2; const c=2*Math.PI*r; const off=c*(1-score/100);
  const col = g.cls==='jade'?'#45cf99':g.cls==='gold'?'#e2c464':'#f18b8b';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(234,232,225,0.08)" stroke-width="10"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="46%" text-anchor="middle" fill="${col}" font-family="Fraunces,serif" font-size="${size*0.26}" font-weight="600">${score}</text>
    <text x="50%" y="66%" text-anchor="middle" fill="#99a2ad" font-family="JetBrains Mono,monospace" font-size="${size*0.1}">/ 100 · ${g.g}</text>
  </svg>`;
}
function bar(label, v, tone){
  const col = v>=70?'#45cf99':v>=50?'#e2c464':'#f18b8b';
  return `<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px"><span class="muted">${esc(label)}</span><span style="color:${col};font-weight:600">${Math.round(v)}</span></div>
    <div style="height:7px;border-radius:6px;background:rgba(234,232,225,0.07);overflow:hidden"><div style="height:100%;width:${clamp(v,0,100)}%;background:${col};border-radius:6px"></div></div></div>`;
}

  const emRisco = scored.filter(x=>x.r.sc.geral<60).length;

  return `

/* ============================ NEGÓCIO / DESEMPENHO — HELPERS ============================ */
function BRL(n){ return 'R$ '+(Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function catById(id){ return DB.categorias.find(c=>c.id===id); }
function seedProdutos(){ if(!DB.produtos.length){ DB.produtos=CAT_PRODUTOS.map((p,i)=>({id:'prd'+i+Date.now().toString(36),...p})); persist(); } }
function patientImprovement(pid){
  const avs=DB.avaliacoes.filter(a=>a.pacienteId===pid).sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  if(avs.length<2) return null;
  const first=computeScore(avs[0]).geral, last=computeScore(avs[avs.length-1]).geral;
  return {first,last,delta:last-first,n:avs.length};
}
function patientTags(pid){
  const tags=new Set();
  DB.consultas.filter(c=>c.pacienteId===pid).forEach(c=>{ if(c.categoriaId==='ema')tags.add('emagrecimento'); if(c.categoriaId==='met')tags.add('metabolica'); if(c.categoriaId==='urg')tags.add('urgencia'); if(c.categoriaId==='end')tags.add('endemia'); });
  const r=patientScore(pid);
  if(r){ if(r.sc.imc && r.sc.imc>=25) tags.add('emagrecimento'); if(r.sc.mental<60) tags.add('mental'); if(examFlagsForPatient(pid)>0) tags.add('metabolica'); }
  const p=patient(pid);
  if(p && p.condicoes){ const c=(p.condicoes+' '+(p.obs||'')).toLowerCase();
    if(/diab|glic|colest|press|tireoi|metab|hipert/.test(c)) tags.add('metabolica');
    if(/obes|peso|emagre|gordura/.test(c)) tags.add('emagrecimento');
    if(/ansi|depress|estress|p[aâ]nico|sono|ins[ôo]nia/.test(c)) tags.add('mental'); }
  return [...tags];
}
function recomendarProdutos(pid){
  const tags=patientTags(pid);
  return DB.produtos.map(pr=>({pr, match:(pr.tags||[]).filter(t=>tags.includes(t)).length}))
    .filter(x=>x.match>0).sort((a,b)=>b.match-a.match || b.pr.preco-a.pr.preco);
}
function patientTimeline(pid){
  const ev=[];
  DB.consultas.filter(x=>x.pacienteId===pid).forEach(c=>ev.push({t:c.data,ico:'🎙',tipo:'Consulta',desc:(c.queixa||'Atendimento').slice(0,60),act:`App.viewConsulta('${c.id}')`}));
  DB.exames.filter(x=>x.pacienteId===pid).forEach(e=>ev.push({t:e.data,ico:'🧪',tipo:'Exame',desc:e.nome||'Exame',act:`App.viewExame('${e.id}')`}));
  DB.avaliacoes.filter(x=>x.pacienteId===pid).forEach(a=>{const s=computeScore(a);ev.push({t:a.data,ico:'❤',tipo:'Índice de Saúde',desc:s.geral+'/100 ('+gradeOf(s.geral).g+')',act:`App.viewAvaliacao('${pid}')`});});
  DB.agenda.filter(x=>x.pacienteId===pid).forEach(a=>ev.push({t:a.data,ico:'📆',tipo:'Agendamento',desc:(a.tipo==='tele'?'Teleconsulta':'Consulta')+' · '+(AG_STATUS[a.status||'agendado'].l)}));
  [['receitas','℞','Receita'],['pedidos','📋','Pedido de exame'],['encaminhamentos','➦','Encaminhamento'],['laudos','📄','Laudo'],['atestados','✎','Atestado']].forEach(([k,ico,lbl])=>{
    DB[k].filter(x=>x.pacienteId===pid).forEach(d=>ev.push({t:d.data,ico,tipo:lbl,desc:d.titulo||lbl,act:`App.printDoc('${k}','${d.id}')`}));
  });
  DB.vendas.filter(x=>x.pacienteId===pid).forEach(v=>ev.push({t:v.data,ico:'🛒',tipo:'Venda',desc:esc(v.nome)+' · '+BRL(v.valor)}));
  return ev.sort((a,b)=>(b.t||'').localeCompare(a.t||''));
}
function pesoSpark(pid){
  const s=DB.sinais.filter(x=>x.pacienteId===pid && x.peso).sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  if(s.length<2) return '';
  const vals=s.map(x=>+x.peso); const min=Math.min(...vals),max=Math.max(...vals),range=(max-min)||1; const w=180,h=40;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${(h-4)-((v-min)/range)*(h-8)+2}`).join(' ');
  const delta=+(vals[vals.length-1]-vals[0]).toFixed(1);
  return `<div style="display:flex;align-items:center;gap:14px;margin:6px 0 4px"><svg width="${w}" height="${h}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${delta<=0?'#45cf99':'#e2c464'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div><div class="li-title">${vals[vals.length-1]} kg</div><div class="li-sub" style="color:${delta<=0?'var(--jade-light)':'var(--gold-light)'}">${delta>0?'+':''}${delta} kg no período</div></div></div>`;
}
function receitaTotal(){ return DB.consultas.filter(c=>c.pagamento==='pago').reduce((s,c)=>s+(c.valor||0),0) + DB.vendas.reduce((s,v)=>s+(v.valor||0),0); }
function aReceber(){ return DB.consultas.filter(c=>c.pagamento==='pendente').reduce((s,c)=>s+(c.valor||0),0); }
function mesAtual(iso){ return (iso||'').slice(0,7)===todayISO().slice(0,7); }

function growthPlan(i){
  const ticket=+i.ticket||0, sem=+i.atendSemana||0;
  const mensalAtual = ticket*sem*4;
  const projTicket = Math.round(ticket*1.3);
  const projMensal = Math.round(projTicket*sem*4*1.2);
  // perfil
  const matLabel = i.maturidade;
  let perfil, foco;
  if(i.gargalo==='Captação'){ perfil='Especialista sem fluxo de captação'; foco='construir uma máquina de aquisição previsível'; }
  else if(i.gargalo==='Conversão'){ perfil='Boa captação, conversão abaixo do potencial'; foco='estruturar a consulta de avaliação e a oferta'; }
  else if(i.gargalo==='Precificação'){ perfil='Entrega alto valor, cobra abaixo do mercado'; foco='reposicionar preço e empacotar em protocolos'; }
  else if(i.gargalo==='Retenção'){ perfil='Atrai, mas perde o paciente cedo'; foco='criar recorrência e acompanhamento de longo prazo'; }
  else { perfil='Sobrecarregado na operação'; foco='ganhar tempo com processos e tecnologia'; }

  const roadmap=[
    {fase:'Semana 1 — Fundação', acoes:['Definir posicionamento e nicho ('+ (i.nicho||'—') +')','Criar a oferta central (protocolo âncora)','Padronizar a consulta no MedEasy (modelo de anamnese + Índice de Saúde como diferencial)']},

        : i.maturidade==='Média'

  ];

  // estratégias

    'Autoridade / marca':['Nomeie seu método próprio','Documente resultados (Índice de Saúde antes/depois) como prova'],
  }[i.objetivo] || [];
  const mkt = i.maturidade==='Baixa'
    ? ['Perfil profissional otimizado + provas sociais','Google Meu Negócio e avaliações','Indicações estruturadas de pacientes atuais']
    : i.maturidade==='Média'

    : ['Tráfego pago para funil de avaliação','Lançamentos e campanhas sazonais','Equipe de atendimento e qualificação'];

    'Retenção':['Planos de acompanhamento e reavaliação','App do Paciente ativo','Recall automático de retorno'],
    'Tempo / operacional':['Use a transcrição e documentos do MedEasy para ganhar tempo','Padronize com modelos de anamnese','Delegue tarefas administrativas'],
  }[i.gargalo] || [];

function latestExamItems(pid){

function mapaSaude(pid){
  const markers=[];
  const av=latestAvaliacao(pid);
  const sinal=DB.sinais.filter(x=>x.pacienteId===pid).sort((a,b)=>(b.data||'').localeCompare(a.data||''))[0];
  let imc = sinal&&sinal.imc?sinal.imc : (av?computeScore(av).imc:null);
  if(imc){ const st= imc>=30?'alerta':(imc>=25||imc<18.5)?'atencao':'ok'; markers.push({nome:'IMC', valor:imc, unidade:'', status:st, exp:'Relação peso/altura. Acima de 25 é sobrepeso; acima de 30, obesidade.'}); }
  if(sinal&&sinal.pa){ markers.push({nome:'Pressão arterial', valor:sinal.pa, unidade:'mmHg', status:'ok', exp:'Pressão do sangue nas artérias. O ideal é em torno de 120/80.'}); }
  Object.values(latestExamItems(pid)).forEach(it=>{ const f=it.flag||''; const st=(f==='high'||f==='low')?'alerta':'ok'; markers.push({nome:it.nome, valor:it.valor, unidade:it.u||'', status:st, exp:EXAM_EXPLAIN[it.nome]||'Marcador laboratorial.'}); });
  const w=DB.wearables[pid]; const wl=w&&(w.leituras||[])[0];
  if(wl){
    if(wl.passos){ const v=+wl.passos; markers.push({nome:'Passos/dia', valor:v, unidade:'', status:v>=8000?'ok':v>=5000?'atencao':'alerta', exp:'Nível de atividade diária medido pelo relógio.'}); }
    if(wl.fcRep){ const v=+wl.fcRep; markers.push({nome:'FC de repouso', valor:v, unidade:'bpm', status:v<=70?'ok':v<=85?'atencao':'alerta', exp:'Frequência cardíaca em repouso — quanto menor, melhor o condicionamento.'}); }
    if(wl.sono){ const v=+wl.sono; markers.push({nome:'Sono (relógio)', valor:v, unidade:'h', status:(v>=7&&v<=9)?'ok':(v>=6)?'atencao':'alerta', exp:'Horas de sono medidas pelo dispositivo.'}); }
    if(wl.spo2){ const v=+wl.spo2; markers.push({nome:'SpO₂ (relógio)', valor:v, unidade:'%', status:v>=95?'ok':v>=92?'atencao':'alerta', exp:'Saturação de oxigênio no sangue.'}); }
  }
  if(av){ const sc=computeScore(av);
    markers.push({nome:'Saúde mental', valor:sc.mental, unidade:'/100', status:sc.mental>=70?'ok':sc.mental>=50?'atencao':'alerta', exp:'Humor, ansiedade, stress, energia e sono.'});
    markers.push({nome:'Hábitos de vida', valor:sc.habitos, unidade:'/100', status:sc.habitos>=70?'ok':sc.habitos>=50?'atencao':'alerta', exp:'Atividade física, alimentação, sono, tabagismo e álcool.'});
  }
  return markers;
}

function habitStreak(h){
  const set=new Set(h.checkins||[]); let s=0; const d=new Date();
  for(;;){ const iso=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); if(set.has(iso)){ s++; d.setDate(d.getDate()-1); } else { if(s===0){ d.setDate(d.getDate()-1); const y=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); if(set.has(y)){ continue; } } break; } }
  return s;

  sigInit(existing){
    const c=document.getElementById('sigPad'); if(!c) return;
    const ctx=c.getContext('2d'); ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.strokeStyle='#14110b';
    App._sig={c,ctx,drawing:false,dirty:false};
    if(existing){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,c.width,c.height); img.src=existing; }
    const pos=e=>{ const r=c.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(c.width/r.width), y:(t.clientY-r.top)*(c.height/r.height)}; };
    const start=e=>{ e.preventDefault(); App._sig.drawing=true; App._sig.dirty=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    const move=e=>{ if(!App._sig.drawing)return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
    const end=()=>{ App._sig.drawing=false; };
    c.onmousedown=start; c.onmousemove=move; window.addEventListener('mouseup',end);
    c.ontouchstart=start; c.ontouchmove=move; c.ontouchend=end;
  },
  sigClear(){ const s=App._sig; if(s){ s.ctx.clearRect(0,0,s.c.width,s.c.height); s.dirty=true; } },

      for(let i=3;i<d.length;i+=4){ if(d[i]!==0){ ink=true; break; } }
      assinatura = ink ? s.c.toDataURL('image/png') : '';

  },

  /* ---- TRANSCRIÇÃO ---- */
  setRecPaciente(v){ rec.pacienteId=v; },
  recStart(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ toast('Navegador sem suporte a reconhecimento de voz','red'); return; }
    if(rec.running) return;
    const r = new SR();
    r.lang='pt-BR'; r.continuous=true; r.interimResults=true;
    r.onresult = (ev)=>{
      let interim='';
      for(let i=ev.resultIndex;i<ev.results.length;i++){
        const t = ev.results[i][0].transcript;
        if(ev.results[i].isFinal){ rec.finalText += (rec.finalText && !/\s$/.test(rec.finalText)?' ':'') + t.trim() + ' '; }
        else interim += t;
      }
      rec.interim = interim;
      paintTranscript();
    };
    r.onerror = (e)=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed'){ toast('Permissão de microfone negada','red'); App.recStop(); } else if(e.error==='no-speech'){/*ignore*/} };
    r.onend = ()=>{ if(rec.running){ try{ r.start(); }catch(e){} } }; // auto-restart while running
    rec.recognition=r; rec.running=true; rec.startTs=Date.now()-(rec.elapsed||0);
    try{ r.start(); }catch(e){}
    rec.timer = setInterval(updateTimer,500);
    updateRecUI();
    toast('Escuta iniciada — fale normalmente','jade');
  },
  recStop(){
    rec.running=false;
    if(rec.recognition){ try{ rec.recognition.stop(); }catch(e){} }
    if(rec.timer){ clearInterval(rec.timer); rec.timer=null; }
    rec.elapsed = Date.now()-rec.startTs;
    rec.interim=''; paintTranscript(); updateRecUI();
  },
  recClear(){
    if(rec.finalText && !confirm('Limpar a transcrição atual?')) return;
    rec.finalText=''; rec.interim=''; rec.elapsed=0; paintTranscript();
    const t=document.getElementById('recTimer'); if(t)t.textContent='00:00';
  },

  exAdd(i){ if(i==='')return; App._syncEx(); const e=CAT_EXAMES[+i]; App._exItems.push({nome:e.n,u:e.u,ref:e.ref,valor:''}); App._renderExItems(); },

  _syncEx(){ App._exItems.forEach((it,i)=>{ const v=val('exv'+i); if(v!=null) it.valor=v; }); },
  _flag(it){ const v=parseFloat(String(it.valor).replace(',','.')); if(isNaN(v)||!it.ref) return ''; if(v<it.ref[0]) return 'low'; if(v>it.ref[1]) return 'high'; return 'ok'; },

    const el=document.getElementById('exItems'); if(!el)return;
    el.innerHTML = App._exItems.map((it,i)=>{
      const f=App._flag(it);
      const fl = f==='high'?'<span class="tag red">↑ Alto</span>':f==='low'?'<span class="tag red">↓ Baixo</span>':f==='ok'?'<span class="tag jade">Normal</span>':'';

      </div>`;
    }).join('');

  exAutoInterp(){

    const txt = 'Achados alterados: ' + alt.map(it=>`${it.nome} = ${it.valor} ${it.u} (${App._flag(it)==='high'?'acima':'abaixo'} da referência ${it.ref[0]}–${it.ref[1]})`).join('; ') + '.';

    toast(alt.length+' parâmetro(s) alterado(s)','gold');

  /* ---- PERFIL DE SAÚDE ---- */

  editPerfilCat(pid, catId){

  _rastreiosCard(pid){
    const r0=((DB.perfilSaude[pid]||{}).rastreios)||{};
    return `<div class="card"><h3 style="font-size:1rem">🔬 Rastreios clínicos validados</h3><div class="card-sub">Instrumentos padronizados com pontuação automática (PHQ-9, GAD-7, AUDIT-C, STOP-BANG)</div>
      <div class="list">${SCREENINGS.map(s=>{ const r=r0[s.id]; const band=r?screeningBand(s,r.score):null; return `<div class="list-item">
        <div class="avatar">${s.ico}</div>
        <div class="grow"><div class="li-title">${esc(s.nome)}</div><div class="li-sub">${r?('Pontuação '+r.score+' · '+fmtDate(r.data)):'Não respondido'}</div></div>

  abrirRastreio(pid, id){
    const s=screenById(id); const prev=(((DB.perfilSaude[pid]||{}).rastreios)||{})[id];

    toast(s.nome.split(' — ')[0]+': '+score+' — '+band.label, band.cls);

  _wearableCard(pid){

    }

        : '<div class="muted" style="font-size:.85rem">Nenhuma leitura ainda. Clique em <b>Sincronizar</b> para registrar os dados do dispositivo.</div>'}</div>`;
  },
  conectarWearable(pid, brandId){

    const b=WEARABLES.find(x=>x.id===brandId);

  desconectarWearable(pid){ if(!confirm('Desconectar o dispositivo? As leituras serão mantidas no histórico.'))return; if(DB.wearables[pid])DB.wearables[pid].marca=null; persist(); this.renderPerfil(pid); },
  syncWearable(pid){
    const w=DB.wearables[pid]||{}; const marca=WEARABLES.find(b=>b.id===w.marca)||{nome:'Dispositivo'};
    openModal(`
      <div class="modal-head"><h3>↻ Sincronizar ${esc(marca.nome)}</h3><button class="icon-btn" onclick="App.closeModal()">✕</button></div>
      <div class="card-sub" style="margin-top:-8px">Informe os dados exibidos no app/relógio (${esc(marca.fonte||'')}).</div>
      <div class="row c2"><div class="field"><label class="f">Data</label><input type="date" id="wr_data" value="${todayISO()}"></div><div></div></div>
      <div class="grid-2">${WEAR_METRICAS.map(m=>`<div class="field"><label class="f">${esc(m.t)} ${m.u?'('+esc(m.u)+')':''}</label><input type="number" step="any" id="wr_${m.id}"></div>`).join('')}</div>
      <button class="btn btn-gold btn-block" onclick="App.salvarWearable('${pid}')">Salvar leitura</button>`, true);

  prescreverHabito(pid, i){

      const nome=prompt('Nome do hábito:'); if(!nome)return; const meta=prompt('Meta (ex.: 2 L, 30 min):')||'';

  checkinHabito(id){

  delHabito(id){ const h=DB.habitos.find(x=>x.id===id); if(!confirm('Excluir hábito?'))return; const pid=h.pacienteId; DB.habitos=DB.habitos.filter(x=>x.id!==id); persist(); this.renderHabitos(pid); toast('Excluído','red'); },

  newAgenda(pacienteId){

    openModal(`
      <div class="modal-head"><h3>Agendar consulta 📆</h3><button class="icon-btn" onclick="App.closeModal()">✕</button></div>
      <div class="field"><label class="f">Paciente *</label><select id="ag_pac"><option value="">—</option>${opts}</select></div>
      <div class="row c2"><div class="field"><label class="f">Data e hora *</label><input type="datetime-local" id="ag_data" value="${dv}"></div>
      <div class="field"><label class="f">Modalidade</label><select id="ag_tipo" onchange="document.getElementById('ag_teleWrap').style.display=this.value==='tele'?'block':'none'"><option value="presencial">Presencial</option><option value="tele">Teleconsulta</option></select></div></div>
      <div class="field" id="ag_teleWrap" style="display:none"><label class="f">Link da teleconsulta</label><input id="ag_tele" placeholder="Cole o link do Meet/Zoom/WhatsApp vídeo"></div>
      <div class="field"><label class="f">Observações</label><input id="ag_obs" placeholder="Motivo, retorno, preparo..."></div>

      <button class="btn btn-gold btn-block" style="margin-top:12px" onclick="App.saveAgenda()">Agendar</button>`);
  },
  saveAgenda(){
    const pid=val('ag_pac'); if(!pid){ toast('Selecione o paciente','red'); return; }
    const dt=val('ag_data'); if(!dt){ toast('Informe data e hora','red'); return; }

  cycleAgenda(id){ const a=DB.agenda.find(x=>x.id===id); if(!a)return; const order=['agendado','realizado','faltou','cancelado']; a.status=order[(order.indexOf(a.status||'agendado')+1)%order.length]; persist(); render(); },
  delAgenda(id){ if(!confirm('Excluir agendamento?'))return; DB.agenda=DB.agenda.filter(a=>a.id!==id); persist(); render(); toast('Excluído','red'); },
  startFromAgenda(id){ const a=DB.agenda.find(x=>x.id===id); if(!a)return; a.status='realizado'; persist(); rec.pacienteId=a.pacienteId; this.go('consulta'); },

  recomendarPara(pid){

    if(!pid){ if(el)el.innerHTML=''; return; }
    const recs=recomendarProdutos(pid); const tags=patientTags(pid);
    const html = `<div class="divider"></div>
      <div style="margin-bottom:10px">Perfil detectado: ${tags.length?tags.map(t=>`<span class="tag jade">${t}</span>`).join(' '):'<span class="muted">sem sinais suficientes — cadastre condições/avaliação</span>'}</div>
      ${recs.length? '<div class="list">'+recs.map(r=>`<div class="list-item">
        <div class="avatar">🎯</div>
        <div class="grow"><div class="li-title">${esc(r.pr.nome)}</div><div class="li-sub">Compatibilidade ${r.match} · ${(r.pr.tags||[]).join(', ')}</div></div>
        <span style="font-family:var(--mono);color:var(--gold-light);margin-right:8px">${BRL(r.pr.preco)}</span>
        <button class="btn btn-jade btn-sm" onclick="App.registrarVenda('${pid}','${r.pr.id}')">Registrar venda</button></div>`).join('')+'</div>'
        : '<div class="muted" style="font-size:.85rem">Nenhum produto compatível. Cadastre produtos com tags que combinem com o perfil.</div>'}`;
    if(el){ el.innerHTML=html; } else { openModal(`<div class="modal-head"><h3>Recomendações — ${esc(patientName(pid))}</h3><button class="icon-btn" onclick="App.closeModal()">✕</button></div>${html}`, true); }
  },
  registrarVenda(pid, prid){
    const pr=DB.produtos.find(p=>p.id===prid); if(!pr) return;
    DB.vendas.push({id:uid(), pacienteId:pid, produtoId:prid, nome:pr.nome, valor:pr.preco, data:now()}); persist();
    toast('Venda registrada: '+BRL(pr.preco),'jade'); render();
  },

  /* ---- PORTAL DO PACIENTE ---- */
  gerarPortal(pid){
    const el=document.getElementById('portalResult'); if(!pid){ if(el)el.innerHTML=''; return; }
    const p=patient(pid); if(!p) return;
    const docs=[];
    DB.receitas.filter(d=>d.pacienteId===pid).forEach(d=>docs.push({t:'Receita', nome:d.titulo||'Receita', data:d.data, key:'receitas', id:d.id}));
    DB.pedidos.filter(d=>d.pacienteId===pid).forEach(d=>docs.push({t:'Pedido de exame', nome:'Pedido de exames', data:d.data, key:'pedidos', id:d.id}));
    DB.encaminhamentos.filter(d=>d.pacienteId===pid).forEach(d=>docs.push({t:'Encaminhamento', nome:d.especialidade, data:d.data, key:'encaminhamentos', id:d.id}));
    DB.atestados.filter(d=>d.pacienteId===pid).forEach(d=>docs.push({t:'Atestado', nome:'Atestado', data:d.data, key:'atestados', id:d.id}));
    DB.laudos.filter(d=>d.pacienteId===pid).forEach(d=>docs.push({t:'Laudo', nome:d.titulo||'Laudo', data:d.data, key:'laudos', id:d.id}));
    const consultas=DB.lembretes.filter(l=>l.pacienteId===pid && l.tipo==='consulta' && l.ativo!==false).map(l=>({titulo:l.titulo, data:l.data}));
    const remedios=DB.lembretes.filter(l=>l.pacienteId===pid && l.tipo==='remedio' && l.ativo!==false).map(l=>({titulo:l.titulo, horarios:l.horarios, freq:l.freq}));
    const exames=DB.pedidos.filter(d=>d.pacienteId===pid).flatMap(d=>(d.itens||[]).map(nome=>({nome, link:''})));
    const habitos=DB.habitos.filter(h=>h.pacienteId===pid && h.ativo!==false).map(h=>({nome:h.nome, meta:h.meta, ico:h.ico, freq:h.freq}));
    const mapa=mapaSaude(pid).map(m=>({nome:m.nome, valor:String(m.valor), unidade:m.unidade, status:m.status, exp:m.exp}));
    const payload={ v:1, medico:{nome:DB.perfil.nome, crm:DB.perfil.crm, tel:DB.perfil.telefone}, paciente:{nome:p.nome},
      consultas, remedios, exames, habitos, mapa,
      docs: docs.map(d=>({...d, html: App._docHtml(d.key, d.id)})) };
    let b64; try{ b64=btoa(unescape(encodeURIComponent(JSON.stringify(payload)))); }catch(e){ b64=''; }
    const base = location.href.replace(/[^/]*$/,'') + 'paciente.html';
    const link = base + '#d=' + b64;
    const wa = `https://wa.me/?text=${encodeURIComponent('Olá '+p.nome+'! Aqui está seu acesso MedEasy (lembretes, exames e documentos): '+link)}`;
    el.innerHTML = `<div class="divider"></div>
      <label class="f">Link do paciente (${docs.length} documento(s), ${consultas.length} consulta(s), ${remedios.length} lembrete(s))</label>
      <textarea id="portalLink" style="min-height:70px;font-family:var(--mono);font-size:.72rem" readonly>${esc(link)}</textarea>
      <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-jade" onclick="navigator.clipboard.writeText(document.getElementById('portalLink').value); App.toast('Link copiado','jade')">📋 Copiar link</button>
        <a class="btn btn-jade" href="${wa}" target="_blank" rel="noopener">📲 Enviar no WhatsApp</a>
        <a class="btn btn-ghost" href="${link}" target="_blank" rel="noopener">👁 Pré-visualizar</a>
      </div>`;
  },
  toast(m,t){ toast(m,t); },
  _docHtml(key, id){
    // reconstrói o corpo do documento como HTML simples para o portal
    const d=DB[key].find(x=>x.id===id); if(!d) return '';
    if(key==='receitas') return (d.itens||[]).map(it=>`<p><b>${esc(it.nome)}</b>${it.qtd?' — '+esc(it.qtd):''}<br><small>${esc(it.pos)}</small></p>`).join('')+(d.orientacoes?`<p><b>Orientações:</b> ${esc(d.orientacoes)}</p>`:'');
    if(key==='pedidos') return (d.itens||[]).map(it=>`<p>☐ ${esc(it)}</p>`).join('')+(d.obs?`<p>${esc(d.obs)}</p>`:'');
    if(key==='encaminhamentos') return `<p>Encaminhamento para <b>${esc(d.especialidade)}</b></p><p>${esc(d.motivo||'')}</p>`;
    if(key==='atestados') return `<p>${esc(d.corpo||'')}</p>${d.cid?`<p>CID: ${esc(d.cid)}</p>`:''}`;
    if(key==='laudos') return `<p>${esc(d.corpo||'')}</p>${d.conclusao?`<p><b>Conclusão:</b> ${esc(d.conclusao)}</p>`:''}`;
    return '';
  },

  /* ---- LEMBRETES ---- */
  newLembrete(tipo){
    const opts=DB.pacientes.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('');
    openModal(`
      <div class="modal-head"><h3>${tipo==='remedio'?'💊 Lembrete de remédio':'📅 Alerta de consulta'}</h3><button class="icon-btn" onclick="App.closeModal()">✕</button></div>
      <div class="field"><label class="f">Paciente *</label><select id="lb_pac"><option value="">—</option>${opts}</select></div>
      <div class="field"><label class="f">${tipo==='remedio'?'Medicação':'Motivo / título'} *</label><input id="lb_tit" placeholder="${tipo==='remedio'?'Ex.: Losartana 50mg':'Ex.: Retorno / reavaliação'}"></div>
      ${tipo==='remedio'?`
        <div class="row c2"><div class="field"><label class="f">Horários</label><input id="lb_hor" placeholder="Ex.: 08:00 e 20:00"></div>
        <div class="field"><label class="f">Frequência</label><input id="lb_freq" placeholder="Ex.: 12/12h por 7 dias"></div></div>`
        :`<div class="field"><label class="f">Data e hora *</label><input type="datetime-local" id="lb_data"></div>`}
      <div class="field"><label class="f">Notas</label><textarea id="lb_notas" style="min-height:50px"></textarea></div>
      <input type="hidden" id="lb_tipo" value="${tipo}">
      <button class="btn btn-gold btn-block" onclick="App.saveLembrete()">Salvar lembrete</button>`);
  },
  saveLembrete(){
    const pid=val('lb_pac'); if(!pid){ toast('Selecione o paciente','red'); return; }
    if(!val('lb_tit').trim()){ toast('Informe o título','red'); return; }
    const tipo=val('lb_tipo');
    const d={ id:uid(), tipo, pacienteId:pid, titulo:val('lb_tit'), notas:val('lb_notas'), ativo:true, criado:now() };
    if(tipo==='remedio'){ d.horarios=val('lb_hor'); d.freq=val('lb_freq'); }
    else { const dt=val('lb_data'); if(!dt){ toast('Informe data e hora','red'); return; } d.data=new Date(dt).toISOString(); }
    DB.lembretes.push(d); persist(); closeModal(); render(); toast('Lembrete criado','jade');
  },
  toggleLembrete(id){ const l=DB.lembretes.find(x=>x.id===id); if(l){ l.ativo=l.ativo===false; persist(); render(); } },
  delLembrete(id){ if(!confirm('Excluir lembrete?'))return; DB.lembretes=DB.lembretes.filter(l=>l.id!==id); persist(); render(); toast('Excluído','red'); },

  delDoc(key,id){ if(!confirm('Excluir documento?'))return; DB[key]=DB[key].filter(d=>d.id!==id); persist(); render(); toast('Excluído','red'); },

  /* ---- IMPRESSÃO ---- */
  printDoc(key,id){
    const d=DB[key].find(x=>x.id===id); if(!d) return;
    const p=patient(d.pacienteId);
    let title='', body='';
    if(key==='receitas'){
      title = d.tipo==='especial'?'Receituário de Controle Especial':'Receituário';
      body = d.itens.map(it=>`<div class="rx-item"><div class="rx-name">${esc(it.nome)} ${it.qtd?'— '+esc(it.qtd):''}</div><div class="rx-pos">${esc(it.pos)}</div></div>`).join('');
      if(d.orientacoes) body += `<div style="margin-top:18px"><strong>Orientações:</strong><br>${esc(d.orientacoes)}</div>`;
    } else if(key==='laudos'){
      title = esc(d.titulo||'Laudo');
      body = `<div class="doc-body">${esc(d.corpo)}</div>${d.conclusao?`<div style="margin-top:20px"><strong>Conclusão:</strong><br>${esc(d.conclusao)}</div>`:''}`;
    } else if(key==='atestados'){
      title = 'Atestado Médico';
      body = `<div class="doc-body" style="text-align:justify">${esc(d.corpo)}</div>${d.cid?`<div style="margin-top:16px">CID: <strong>${esc(d.cid)}</strong></div>`:''}`;
    } else if(key==='encaminhamentos'){
      title = 'Encaminhamento';
      body = `<div style="margin-bottom:14px">Encaminho o(a) paciente acima identificado(a) para avaliação em <strong>${esc(d.especialidade)}</strong>${d.prioridade&&d.prioridade!=='Eletiva'?` <span style="color:#b23">(${esc(d.prioridade)})</span>`:''}.</div><div class="doc-body"><strong>Motivo / hipótese diagnóstica:</strong><br>${esc(d.motivo||'—')}</div>`;
    } else if(key==='pedidos'){
      title = 'Solicitação de Exames';
      body = (d.itens&&d.itens.length? d.itens.map(it=>`<div class="rx-item"><div class="rx-name">☐ ${esc(it)}</div></div>`).join('') : '') + (d.obs?`<div style="margin-top:14px"><strong>Observações:</strong><br>${esc(d.obs)}</div>`:'') + (d.indicacao?`<div style="margin-top:14px"><strong>Indicação clínica:</strong> ${esc(d.indicacao)}</div>`:'');
    }
    App._print(title, p, body, d.data);
  },
  printSuplemento(id){
    const d=DB.suplementos.find(x=>x.id===id); if(!d)return; const p=patient(d.pacienteId);
    const body = d.itens.map(it=>`<div class="rx-item"><div class="rx-name">${esc(it.nome)} ${it.dose?'— '+esc(it.dose):''}</div><div class="rx-pos">${esc(it.ind)}</div></div>`).join('') + (d.obs?`<div style="margin-top:18px"><strong>Observações:</strong><br>${esc(d.obs)}</div>`:'');
    App._print('Recomendação de Suplementação', p, body, d.data);
  },
  _print(title, p, bodyHtml, dataIso){
    const pf=DB.perfil;
    const idade = p&&age(p.nascimento)!=null? age(p.nascimento)+' anos':'';
    const area=document.getElementById('printArea');
    area.innerHTML = `<div class="doc">
      <div class="doc-header">
        <div><div class="dh-name">${esc(pf.nome||'—')}</div><div class="dh-meta">${esc(pf.especialidade||'')}${pf.crm?' · '+esc(pf.crm):''}</div>${pf.clinica?`<div class="dh-meta">${esc(pf.clinica)}</div>`:''}</div>
        <div class="dh-right">${pf.endereco?esc(pf.endereco)+'<br>':''}${pf.cidade?esc(pf.cidade)+'<br>':''}${pf.telefone?esc(pf.telefone):''}</div>
      </div>
      <h1 class="doc-title">${title}</h1>
      <div class="doc-patient"><strong>Paciente:</strong> ${esc(p?p.nome:'—')} ${idade?'· '+idade:''} ${p&&p.cpf?'· CPF: '+esc(p.cpf):''}</div>
      ${bodyHtml}
      <div class="doc-sign">
        ${pf.assinatura?`<img src="${pf.assinatura}" alt="assinatura" style="height:60px;margin:0 auto 2px;display:block">`:'<div style="height:56px"></div>'}
        <div class="line"></div>${esc(pf.nome||'')}${pf.crm?'<br>'+esc(pf.crm):''}
        ${pf.carimbo!==false?`<div class="doc-stamp">${esc(pf.nome||'')}<span>${esc(pf.especialidade||'')}</span><span>${esc(pf.crm||'CRM —')}</span></div>`:''}
      </div>
      <div class="doc-foot">${esc(pf.cidade||'')}, ${fmtLongDate(dataIso)} — Documento emitido pelo MedEasy · assinado digitalmente</div>
    </div>`;
    setTimeout(()=>window.print(), 60);
  },

  /* ---- DADOS ---- */
  exportData(){
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='sistema-clinico-backup-'+todayISO()+'.json'; a.click();
    toast('Backup exportado','jade');
  },
  importData(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
    inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const r=new FileReader();
      r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!confirm('Substituir todos os dados atuais pelo arquivo importado?'))return;
        DB=Object.assign({perfil:seedPerfil,conta:DB.conta,pacientes:[],consultas:[],receitas:[],laudos:[],atestados:[],exames:[],lembretes:[],suplementos:[],encaminhamentos:[],pedidos:[],avaliacoes:[],categorias:[],produtos:[],vendas:[],agenda:[],sinais:[],diagnostico:null,habitos:[],perfilSaude:{},wearables:{}}, data);
        if(!DB.conta) DB.conta=null;
        persist(); render(); toast('Dados importados','jade'); }catch(e){ toast('Arquivo inválido','red'); } };
      r.readAsText(f); };
    inp.click();
  },
};
window.App = App;

/* ============================ HELPERS UI ============================ */
function val(id){ const e=document.getElementById(id); return e?e.value:null; }
function rval(id){ const e=document.getElementById(id); return e?+e.value:5; }
function setVal(id,v){ const e=document.getElementById(id); if(e)e.value=v; }
function field(label, content){ return `<div class="field"><label class="f">${esc(label)}</label><div style="white-space:pre-wrap">${esc(content)}</div></div>`; }

function paintTranscript(){
  const box=document.getElementById('transcriptBox'); if(!box) return;
  const atEnd = true;
  box.innerHTML = esc(rec.finalText) + (rec.interim?`<span class="interim">${esc(rec.interim)}</span>`:'');
  box.scrollTop = box.scrollHeight;
}
function updateTimer(){
  const t=document.getElementById('recTimer'); if(!t) return;
  const ms = rec.running? Date.now()-rec.startTs : (rec.elapsed||0);
  const s=Math.floor(ms/1000); t.textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function updateRecUI(){
  const dot=document.getElementById('recDot'), start=document.getElementById('recStart'), stop=document.getElementById('recStop');
  if(dot) dot.className='rec-dot'+(rec.running?' live':'');
  if(start) start.style.display=rec.running?'none':'';
  if(stop) stop.style.display=rec.running?'':'none';
  updateTimer();
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ============================ AUTH GATE ============================ */
const authGate=document.getElementById('authGate');
function showAuth(mode){
  let html;
  if(mode==='create'){
    html=`<div class="auth-card">
      <div class="auth-logo">M</div>
      <h2 class="grad-text">Bem-vindo ao MedEasy</h2>
      <div class="sub">Crie sua conta profissional. Seus dados ficam protegidos neste dispositivo.</div>
      <div class="field"><label class="f">Seu nome</label><input id="ac_nome" value="${esc(DB.perfil.nome||'')}" placeholder="Dr(a). Nome"></div>
      <div class="field"><label class="f">E-mail</label><input id="ac_email" type="email" placeholder="voce@email.com"></div>
      <div class="row c2"><div class="field"><label class="f">Senha</label><input id="ac_senha" type="password" placeholder="mín. 4"></div>
      <div class="field"><label class="f">Confirmar</label><input id="ac_senha2" type="password" onkeydown="if(event.key==='Enter')App.criarConta()"></div></div>
      <button class="btn btn-gold btn-block" onclick="App.criarConta()">Criar conta e entrar</button>
      <div class="auth-err" id="auth_err"></div>
      <div class="auth-foot">🔒 Trava de acesso local · dados só neste navegador (LGPD)</div>
    </div>`;
  } else {
    const nome=(DB.conta.nome||'').split(' ')[0];
    html=`<div class="auth-card">
      <div class="auth-logo">M</div>
      <h2>Olá, ${esc(nome)} 👋</h2>
      <div class="sub">Digite sua senha para acessar o MedEasy.</div>
      <div class="field"><input id="lg_senha" type="password" placeholder="Senha" autofocus onkeydown="if(event.key==='Enter')App.entrar()"></div>
      <button class="btn btn-gold btn-block" onclick="App.entrar()">Entrar</button>
      <div class="auth-err" id="auth_err"></div>
      <div class="auth-foot"><a onclick="App.esqueciSenha()">Esqueci minha senha</a></div>
    </div>`;
  }
  authGate.innerHTML=html; authGate.classList.add('show');
  setTimeout(()=>{ const f=document.getElementById(mode==='create'?'ac_nome':'lg_senha'); if(f)f.focus(); },60);
}
function hideAuth(){ authGate.classList.remove('show'); authGate.innerHTML=''; }
function boot(){
  if(!DB.conta){ showAuth('create'); }
  else if(!unlocked){ showAuth('lock'); }
  else { hideAuth(); render(); }
}

/* ============================ INIT ============================ */
boot();
(function(){ const sp=document.getElementById('splash'); if(sp){ setTimeout(()=>sp.classList.add('hide'), 950); setTimeout(()=>sp.remove(), 1600); } })();
})();
</script>
